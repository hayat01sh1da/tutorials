# This workflow updates gem dependencies and the RBS collection every day in
# every Ruby on Rails application in parallel and opens a pull request when
# any dependency changes are detected.

name: Ruby on Rails - Daily Dependencies Update

on:
  schedule:
    # 0:00 JST every day
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update_gem_dependencies:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - ruby-on-rails/e-navigator
          - ruby-on-rails/perfect-ruby-on-rails
          - ruby-on-rails/restful-api
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-ruby-on-rails
        with:
          working-directory: ${{ matrix.app }}
          job-name: update_gem_dependencies
      - name: Update Gem Dependencies in ${{ matrix.app }}
        working-directory: ${{ matrix.app }}
        env:
          BUNDLE_FROZEN: "false"
        run: |
          gem update --system
          gem install bundler
          bundle update --all
          bundle exec rbs collection update
      - name: Mirror Updated Versions to Gemfile
        working-directory: ${{ matrix.app }}
        run: |
          ruby <<'RUBY'
          versions = File.read('Gemfile.lock').scan(/^    (\S+) \((\d+(?:\.\d+)*)\)$/).to_h
          gemfile = File.read('Gemfile').gsub(/^(\s*gem '([^']+)', )'~> [^']+'/) do
            versions[$2] ? "#{$1}'~> #{versions[$2]}'" : $~[0]
          end
          File.write('Gemfile', gemfile)
          RUBY
      - name: Export Dependency Changes
        run: git diff > "${{ runner.temp }}/${{ strategy.job-index }}.patch"
      - uses: actions/upload-artifact@v7
        with:
          name: gem-dependency-changes-${{ strategy.job-index }}
          path: ${{ runner.temp }}/${{ strategy.job-index }}.patch

  create_pull_request:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: update_gem_dependencies
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          pattern: gem-dependency-changes-*
          merge-multiple: true
          path: ${{ runner.temp }}/patches
      - name: Apply Dependency Changes
        run: |
          shopt -s nullglob
          for patch in "${{ runner.temp }}"/patches/*.patch; do
            if [ -s "$patch" ]; then git apply "$patch"; fi
          done
      - name: Generate Pull Request Description
        env:
          BODY_PATH: ${{ runner.temp }}/pr_body.md
        run: |
          gem_rows() {
            git diff --unified=0 -- "$1/Gemfile.lock" \
              | grep -E '^[+-] {4}[^ ]+ \([0-9]' \
              | sed -E 's/^(.) +/\1 /; s/[()]//g' \
              | awk '{ if ($1 == "-") before[$2] = $3; else after[$2] = $3 }
                END {
                  for (name in after) {
                    if (name in before) {
                      if (before[name] != after[name]) print "|" name " |" before[name] " |" after[name] " |Updated |"
                      delete before[name]
                    } else {
                      print "|" name " |- |" after[name] " |Added |"
                    }
                  }
                  for (name in before) print "|" name " |" before[name] " |- |Removed |"
                }' \
              | sort
          }
          {
            cat <<'OVERVIEW'
          ## 1. Overview

          This pull request was created automatically by the Ruby on Rails - Daily Dependencies Update workflow.
          It upgrades RubyGems and Bundler, updates every gem to the latest version allowed by each Gemfile, updates each RBS collection, and mirrors the updated versions to each Gemfile:

          ~~~console
          gem update --system
          gem install bundler
          bundle update --all
          bundle exec rbs collection update
          ~~~

          ## 2. Key Changes & Differences
          OVERVIEW
            for app in ruby-on-rails/e-navigator ruby-on-rails/perfect-ruby-on-rails ruby-on-rails/restful-api; do
              echo
              echo "### $app"
              echo
              echo "|Gems |Before |After |Changes & Differences |"
              echo "|:-|:-|:-|:-|"
              ROWS=$(gem_rows "$app")
              if [ -z "$ROWS" ]; then ROWS='| | | |No dependency changes detected |'; fi
              echo "$ROWS"
            done
            cat <<SUMMARY

          ## 3. Summary

          All gem dependencies (Gemfile and Gemfile.lock) and RBS collections (rbs_collection.lock.yaml) in the Ruby on Rails applications are now up to date.
          Please make sure that all CI workflows pass before merging this pull request.

          ## 4. References

          - [Ruby on Rails - Daily Dependencies Update workflow run](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)
          - [bundle update documentation](https://bundler.io/man/bundle-update.1.html)
          - [RBS collection documentation](https://github.com/ruby/rbs/blob/master/docs/collection.md)
          SUMMARY
          } > "$BODY_PATH"
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: daily/ruby-on-rails-dependency-updates
          delete-branch: true
          commit-message: "[Daily][Ruby on Rails] Update Gem dependencies"
          title: "[Daily][Ruby on Rails] Update Gem dependencies"
          body-path: ${{ runner.temp }}/pr_body.md
          reviewers: hayat01sh1da
          assignees: hayat01sh1da
