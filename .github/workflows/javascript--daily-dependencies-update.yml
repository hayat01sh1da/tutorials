# This workflow updates pnpm package dependencies every day in every
# application that contains JavaScript (including Ruby on Rails applications
# with a package.json) in parallel and opens a pull request when any
# dependency changes are detected.

name: JavaScript - Daily Dependencies Update

on:
  schedule:
    # 0:00 JST every day
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update_pnpm_package_dependencies:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - javascript
          - typescript
          - reactjs
          - ruby-on-rails/perfect-ruby-on-rails
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nodejs
        with:
          working-directory: ${{ matrix.app }}
      - name: Update pnpm Package Dependencies in ${{ matrix.app }}
        working-directory: ${{ matrix.app }}
        run: |
          corepack use pnpm@latest
          pnpm update
      - name: Export Dependency Changes
        run: git diff > "${{ runner.temp }}/${{ strategy.job-index }}.patch"
      - uses: actions/upload-artifact@v7
        with:
          name: pnpm-dependency-changes-${{ strategy.job-index }}
          path: ${{ runner.temp }}/${{ strategy.job-index }}.patch

  create_pull_request:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: update_pnpm_package_dependencies
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          pattern: pnpm-dependency-changes-*
          merge-multiple: true
          path: ${{ runner.temp }}/patches
      - name: Apply Dependency Changes
        run: |
          shopt -s nullglob
          for patch in "${{ runner.temp }}"/patches/*.patch; do
            if [ -s "$patch" ]; then git apply "$patch"; fi
          done
      - name: Generate Pull Request Description
        env:
          BODY_PATH: ${{ runner.temp }}/pr_body.md
        run: |
          {
            cat <<'OVERVIEW'
          ## 1. Overview

          This pull request was created automatically by the JavaScript - Daily Dependencies Update workflow.
          It updates pnpm itself (pinning the new version to the packageManager field of each package.json), updates every pnpm package dependency to the latest version allowed by each package.json, and regenerates each pnpm-lock.yaml:

          ~~~console
          corepack use pnpm@latest
          pnpm update
          ~~~

          ## 2. Key Changes & Differences
          OVERVIEW
            for app in javascript typescript reactjs ruby-on-rails/perfect-ruby-on-rails; do
              echo
              echo "### $app"
              echo
              bash .github/scripts/dependency_report.sh pnpm "$app/pnpm-lock.yaml" "$app/package.json" Packages
            done
            cat <<SUMMARY

          ## 3. Summary

          The pnpm version pinned in each package.json and all pnpm package dependencies in javascript, typescript, reactjs, and ruby-on-rails/perfect-ruby-on-rails are now up to date.
          Please make sure that all CI workflows pass before merging this pull request.

          ## 4. References

          - [JavaScript - Daily Dependencies Update workflow run](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)
          - [pnpm update documentation](https://pnpm.io/cli/update)
          - [npm](https://www.npmjs.com/)
          SUMMARY
          } > "$BODY_PATH"
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          sign-commits: true
          branch: hayat01sh1da/daily/update-pnpm-package-dependencies
          delete-branch: true
          commit-message: "[Daily][JavaScript] Update pnpm Package Dependencies"
          title: "[Daily][JavaScript] Update pnpm Package Dependencies"
          body-path: ${{ runner.temp }}/pr_body.md
          reviewers: hayat01sh1da
          assignees: hayat01sh1da
