# Reference: https://github.com/rubocop/ruby-style-guide

plugins:
  - rubocop-capybara
  - rubocop-factory_bot
  - rubocop-minitest
  - rubocop-performance
  - rubocop-rails

AllCops:
  TargetRubyVersion: 4.0
  NewCops: enable
  Exclude:
    - 'bin/**/*'
    - 'db/schema.rb'
    - 'vendor/**/*'
    - 'node_modules/**/*'

# Rails.application.configure blocks in environment configs are
# framework-generated and inherently long; tests inline fixture setups.
Metrics/BlockLength:
  Exclude:
    - 'config/environments/*'
    - 'test/**/*'

# The Devise-generated migration packs many column definitions into one
# change method; tests inline long fixture setups.
Metrics/MethodLength:
  Exclude:
    - 'db/migrate/20180401221813_devise_create_users.rb'
    - 'test/**/*'

Metrics/AbcSize:
  Exclude:
    - 'db/migrate/20180401221813_devise_create_users.rb'

Metrics/ClassLength:
  Exclude:
    - 'test/**/*'

# The Devise-generated migration adds three add_index calls after create_table.
Rails/BulkChangeTable:
  Exclude:
    - 'db/migrate/20180401221813_devise_create_users.rb'

# Integration tests assert every step of multi-request flows.
Minitest/MultipleAssertions:
  Exclude:
    - 'test/**/*'
