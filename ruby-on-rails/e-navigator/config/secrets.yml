# This file is no longer used in Rails 8.
# Secrets have been migrated to Rails credentials (config/credentials.yml.enc)
# or environment variables.
#
# For production, set SECRET_KEY_BASE environment variable.
# For development/test, Rails will auto-generate a secret key base.
#
# To edit credentials: bin/rails credentials:edit

production:
  secret_key_base: <%= ENV["SECRET_KEY_BASE"] %>
