# Download sources
sources:
  - type: git
    name: ruby/gem_rbs_collection
    remote: https://github.com/ruby/gem_rbs_collection.git
    revision: main
    repo_dir: gems

# You can specify local directories as sources also.
# - type: local
#   path: path/to/your/local/repository

# A directory to install the downloaded RBSs
path: .gem_rbs_collection

gems:
  # If you want to avoid installing rbs files for gems, you can specify them here.
  #   - name: GEM_NAME
  #     ignore: true
  #
  # `benchmark` is a real (dev-only) gem dependency, but rbs-gem only ships a
  # deprecated stdlib signature for it. Ignore it here so `rbs collection update`
  # stops pulling the deprecated `stdlib/benchmark/0` RBS and emitting the warning.
  - name: benchmark
    ignore: true
