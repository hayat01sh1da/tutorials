# Download sources
sources:
  - type: git
    name: ruby/gem_rbs_collection
    remote: https://github.com/ruby/gem_rbs_collection.git
    revision: main
    repo_dir: gems

# You can specify local directories as sources also.
# - type: local
#   path: path/to/your/local/repository

# A directory to install the downloaded RBSs
path: .gem_rbs_collection

gems:
  # If you want to avoid installing rbs files for gems, you can specify them here.
  #   - name: GEM_NAME
  #     ignore: true
  #
  # `benchmark` is a real (dev-only) gem dependency, but rbs-gem only ships a
  # deprecated stdlib signature for it. Ignore it here so `rbs collection update`
  # stops pulling the deprecated `stdlib/benchmark/0` RBS and emitting the warning.
  - name: benchmark
    ignore: true
  # `auth-sanitizer` (a transitive dependency) ships its own RBS, but as of
  # 0.2.0 those signatures declare `::Auth::Sanitizer::VERSION` twice (in both
  # sig/auth/sanitizer.rbs and sig/auth/sanitizer/version.rbs), which raises
  # RBS::DuplicatedDeclarationError and crashes `steep check` before any
  # type checking runs. The app never references the gem's types, so ignore it.
  - name: auth-sanitizer
    ignore: true
  # `snaky_hash` (a transitive dependency via oauth2) ships its own RBS, but as
  # of 2.0.5 sig/snaky_hash.rbs declares `::SnakyHash::VERSION` twice (in both
  # sig/snaky_hash.rbs and sig/snaky_hash/version.rbs), which raises
  # RBS::DuplicatedDeclarationError and crashes `steep check` before any
  # type checking runs. The app never references the gem's types, so ignore it.
  - name: snaky_hash
    ignore: true
