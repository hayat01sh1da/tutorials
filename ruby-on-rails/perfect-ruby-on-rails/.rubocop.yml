# Reference: https://github.com/rubocop/ruby-style-guide

plugins:
  - rubocop-capybara
  - rubocop-factory_bot
  - rubocop-minitest
  - rubocop-performance
  - rubocop-rails

AllCops:
  TargetRubyVersion: 4.0
  NewCops: enable
  Exclude:
    - 'bin/**/*'
    - 'db/schema.rb'
    - 'vendor/**/*'
    - 'node_modules/**/*'
    # Engine-installed Active Storage migrations are vendor-style code.
    - 'db/migrate/*active_storage*.rb'

# Tests inline long fixture-style setups and assert multiple expectations.
Metrics/MethodLength:
  Exclude:
    - 'test/**/*'

Minitest/MultipleAssertions:
  Exclude:
    - 'test/**/*'
