services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "6000:6000"
    command: sh -c "rm -f tmp/pids/server.pid && bin/rails s -b 0.0.0.0 -p 6000"
    environment:
      # Suppress Ruby warnings during runtime by setting RUBYOPT=-W0 (silences warnings)
      - RUBYOPT=-W0
    stdin_open: true
    tty: true
    depends_on:
      - db
    volumes:
      - .:/app
      - bundle:/app/vendor/bundle
      # Back the RBS collection with a named volume so it is not on the
      # world-writable Windows bind mount, which breaks FileUtils.remove_entry_secure.
      - gem_rbs_collection:/app/.gem_rbs_collection
  db:
    image: mysql:9.6.0
    ports:
      - '3309:3306'
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
    driver: local
  bundle:
    driver: local
  gem_rbs_collection:
    driver: local
